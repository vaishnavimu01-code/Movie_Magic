<!DOCTYPE html>
<html>
<head>
  <title>Search Results - MovieMagic</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Search Results</h2>

<div class="movie-grid">
  {% for m in movies %}
  
    <div class="movie-card">

      <div class="movie-poster">
        <img src="{{ url_for('static', filename=m.poster) }}" alt="{{ m.title }}">
      </div>

      <h3>{{ m.title }}</h3>
      <p>{{ m.desc }}</p>
      <p>Languages: {{ m.language }}</p>
      <p>Price: ₹{{ m.price }}</p>

      <a href="{{ url_for('book', movie_id=m.movie_id) }}" class="btn">Book Now</a>

    </div>

  {% endfor %}
</div>

</body>
</html>
